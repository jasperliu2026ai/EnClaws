name: Build macOS DMG / 构建 macOS DMG 安装包

# 手动触发，支持自定义版本号和构建架构
on:
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version (leave empty to use package.json version) / 应用版本号（留空则从 package.json 读取）'
        required: false
        type: string
      build_archs:
        description: 'Build architecture / 构建架构'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - x86_64

jobs:
  build-dmg:
    name: Build macOS DMG
    # 使用 macOS 15 (Sequoia) runner，支持 Swift 6.2 / Xcode 26+
    runs-on: macos-15

    steps:
      # 1. 检出代码
      - name: Checkout repository / 检出代码
        uses: actions/checkout@v4

      # 2. 安装 pnpm 包管理器
      - name: Setup pnpm / 安装 pnpm
        uses: pnpm/action-setup@v4

      # 3. 设置 Node.js 22，并启用 pnpm 缓存加速后续安装
      - name: Setup Node.js 22 / 配置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. 验证 Swift 版本，确认 runner 支持 Swift 6.2+
      - name: Verify Swift version / 验证 Swift 版本
        run: swift --version

      # 5. 安装项目依赖
      - name: Install dependencies / 安装依赖
        run: pnpm install

      # 6. 为 scripts/ 目录下的所有 shell 脚本赋予可执行权限
      - name: Make scripts executable / 赋予脚本执行权限
        run: chmod +x scripts/*.sh

      # 7. 构建 macOS 应用
      #    - ALLOW_ADHOC_SIGNING=1：使用 ad-hoc 签名（无需正式开发者证书）
      #    - BUNDLE_ID：应用 Bundle ID
      #    - BUILD_ARCHS：目标架构（all = 通用二进制 arm64+x86_64）
      #    - APP_VERSION：版本号（未指定时由脚本自动从 package.json 读取）
      - name: Build macOS app / 构建 macOS 应用
        env:
          ALLOW_ADHOC_SIGNING: '1'
          BUNDLE_ID: 'ai.enclaws.mac'
          BUILD_ARCHS: ${{ inputs.build_archs || 'all' }}
          APP_VERSION: ${{ inputs.app_version }}
        run: bash scripts/package-mac-app.sh

      # 8. 将构建好的 .app 打包为 DMG 安装镜像
      #    DMG 文件名由 create-dmg.sh 自动生成（含版本号），输出至 dist/
      - name: Create DMG / 创建 DMG 安装包
        run: bash scripts/create-dmg.sh dist/EnClaws.app

      # 9. 上传 .app（zip 压缩）作为构建产物，保留 7 天
      - name: Upload .app artifact / 上传 .app 产物
        uses: actions/upload-artifact@v4
        with:
          name: EnClaws-app
          path: dist/EnClaws.app
          if-no-files-found: error
          retention-days: 7

      # 10. 上传 DMG 文件作为构建产物，保留 7 天
      - name: Upload DMG artifact / 上传 DMG 产物
        uses: actions/upload-artifact@v4
        with:
          name: EnClaws-dmg
          path: dist/EnClaws-*.dmg
          if-no-files-found: error
          retention-days: 7
