title: "[Q&A]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Ask questions about installing, configuring, or using EnClaws.
        Community members and maintainers can mark the best answer.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant details about your setup (OS, Node.js version, EnClaws version, deployment method).
      placeholder: |
        - OS: macOS 15.4
        - Node.js: 22.12.0
        - EnClaws: 0.1.18
        - Deployment: Docker / npm / source
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, config snippets, or anything else that helps explain the question.
    validations:
      required: false
